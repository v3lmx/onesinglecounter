name: minify

on:
  push:
    branches: ["ci"]
  workflow_dispatch:

jobs:
  minify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install UglifyJS
      run: npm install -g uglify-js

    - name: Minify JavaScript files
      run: |
        uglifyjs web/script.js --compress dead_code,evaluate,booleans,loops,unused,hoist_funs,hoist_vars,if_return,join_vars,cascade --mangle -o web/script.min.js

    - name: Commit and push minified files
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "bot:minify js files"
        git push origin ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

